<!doctype html>

    <style>
        .base64 {
            background-color: #f0f0f0;
            padding: 2px 4px;
            border-radius: 3px;
        }
        .ascii {
            background-color: #e0e0e0;
            padding: 2px 4px;
            border-radius: 3px;
        }
        .description {
            background-color: #f0e6e6;
            padding: 2px 4px;
            border-radius: 3px;
        }
        .label {
            font-style: italic;
            padding: 2px 4px;
            border-radius: 3px;
        }
        .license-table  {
            border-collapse: collapse;
            border-color: #8a1f8a;
            border-width: 1px;
            border-style: solid;
            width: 100%;
        }
        .license-table td {
            border-color: #8a1f8a;
            border-width: 1px;
            border-style: solid;
            padding: 4px;
        }
        div.license-unit {
            margin-top: 6px;
            margin-bottom: 6px;
            line-height: 130%;
        }
        .license-error {
            color: red;
            font-weight: bold;
        }
